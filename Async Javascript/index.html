<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    console.log(1);
    console.log(2);
    // Hành động chờ
    setTimeout(() => {
        console.log('Run after 3s');
    }, 3000);
    console.log(3);
    console.log(4);
    console.log(5);
</script>
<body>
    <h1>Async Javascript</h1>
</body>
</html>

<!-- Bất đồng bộ cho phép các tác vụ này thực thi mà không cần chờ đợi tới khi tác vụ trước đó hoàn thành -->
